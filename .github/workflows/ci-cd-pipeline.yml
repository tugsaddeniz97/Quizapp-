name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    name: Backend - Build & Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # QA Measure 1: Dependency Security Check
      - name: Restore dependencies
        run: dotnet restore

      # QA Measure 2: Build Verification
      - name: Build
        run: dotnet build --configuration Release --no-restore

      # QA Measure 3: Unit Tests with Coverage
      - name: Run Unit Tests with Coverage
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      # QA Measure 4: Upload Coverage Report
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: "**/coverage.cobertura.xml"
          fail_ci_if_error: false
        continue-on-error: true

      # QA Measure 5: Code Quality Analysis
      - name: Check Code Formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: true

  frontend-ci:
    runs-on: ubuntu-latest
    name: Frontend - Build & Lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.19.x"
          cache: "npm"
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Frontend

      - name: Frontend lint
        run: npm run lint --if-present
        working-directory: Frontend

      - name: Frontend build
        run: npm run build
        working-directory: Frontend

  # Simulated Deployment
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Deploy to Production

    steps:
      - name: Simulate Deployment
        run: |
          echo "🚀 Deploying to production environment..."
          echo "✅ Deployment successful (simulated)"

  # Monitoring (Simulated)
  monitoring:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Production Monitoring

    steps:
      - name: Simulate Health Check
        run: |
          echo "🔍 Running production health checks..."
          echo "✅ API endpoint: healthy"
          echo "✅ Database connection: healthy"
          echo "✅ Response time: 120ms"
          echo "📊 Monitoring complete"
