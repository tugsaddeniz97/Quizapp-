name: Continuous Delivery Pipeline

# WHEN DOES THIS RUN?
# - When you push code to main or develop branches
# - When someone creates a Pull Request to main branch
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# ENVIRONMENT VARIABLES (reusable values throughout the pipeline)
env:
  DOTNET_VERSION: '10.0.x'                          # .NET version for your backend
  BACKEND_PROJECT: 'Backend/QuizApp/QuizApp.csproj' # Path to your .csproj file
  TEST_PROJECT: 'Backend/QuizApp.Tests/QuizApp.Tests.csproj'  # Path to test project
  FRONTEND_DIR: 'Frontend'                          # Your frontend folder

# ============================================================================
# JOBS - These run in parallel (unless you use 'needs' to make them wait)
# ============================================================================

jobs:

  # ==========================================================================
  # JOB 1: BUILD AND TEST BACKEND (Test Environment - CI)
  # MUST HAVE: Automated CI to test environment + Unit tests
  # ==========================================================================
  backend-ci:
    name: Backend - Build & Test (CI Environment)
    runs-on: ubuntu-latest  # Use a Linux virtual machine
    
    steps:
    # STEP 1: Download your code from GitHub
    - name: 📥 Checkout code
      uses: actions/checkout@v4  # Pre-built action from GitHub Marketplace
    
    # STEP 2: Install .NET 10 SDK
    - name: 🔧 Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}  # Use the variable we defined above
    
    # STEP 3: Download NuGet packages (like npm install for .NET)
    - name: 📦 Restore dependencies
      run: dotnet restore ${{ env.BACKEND_PROJECT }}
      # This downloads packages from QuizApp.csproj:
      # - Microsoft.EntityFrameworkCore
      # - Microsoft.EntityFrameworkCore.Sqlite
      # - etc.
    
    # STEP 4: Compile the C# code
    - name: 🏗️ Build Backend
      run: dotnet build ${{ env.BACKEND_PROJECT }} --configuration Release --no-restore
      # --configuration Release = Optimized for production
      # --no-restore = Skip restore (already done in step 3)
    
    # STEP 5: Run unit tests (MUST HAVE requirement)
    - name: 🧪 Run Unit Tests
      run: |
        dotnet test ${{ env.TEST_PROJECT }} \
          --configuration Release \
          --no-build \
          --logger "trx" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults
      # --no-build = Use already compiled code (faster)
      # --logger "trx" = Save results in XML format
      # --collect:"XPlat Code Coverage" = Measure which lines of code were tested
      # --results-directory = Where to save test results
    
    # STEP 6: Generate code coverage report (SHOULD HAVE - QA Measure #1)
    - name: 📊 Code Coverage Analysis
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: 'TestResults/**/coverage.cobertura.xml'  # Find coverage files
        fail_below_min: false   # Don't fail the build (just warn)
        thresholds: '70 80'     # Warn if <70%, fail if <80%
        format: markdown        # Create a nice report
        output: both            # Show in console and create file
    
    # STEP 7: Upload test results (so you can download them from GitHub UI)
    - name: 📤 Upload Test Results
      if: always()  # Run even if tests failed
      uses: actions/upload-artifact@v4
      with:
        name: backend-test-results
        path: TestResults/**/*
        retention-days: 30  # Keep for 30 days
    
    # STEP 8: Create deployment package
    - name: 📦 Publish Backend for Deployment
      run: dotnet publish ${{ env.BACKEND_PROJECT }} -c Release -o ./backend-build
      # -c Release = Production build
      # -o ./backend-build = Output folder
      # This creates a self-contained application ready to deploy
    
    # STEP 9: Upload build artifact (used by deployment job later)
    - name: 📤 Upload Backend Build
      uses: actions/upload-artifact@v4
      with:
        name: backend-build
        path: ./backend-build
        retention-days: 7

  # ==========================================================================
  # JOB 2: BUILD AND TEST FRONTEND (Test Environment - CI)
  # MUST HAVE: Automated CI to test environment
  # ==========================================================================
  frontend-ci:
    name: Frontend - Build & Test (CI Environment)
    runs-on: ubuntu-latest
    
    steps:
    # STEP 1: Download code
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    # STEP 2: Install Node.js (needed for React/Vue/Vite)
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'  # Use Node.js version 20 (or change to your version)
        cache: 'npm'        # Cache npm packages for faster builds
        cache-dependency-path: '${{ env.FRONTEND_DIR }}/package-lock.json'
    
    # STEP 3: Install frontend dependencies (like npm install)
    - name: 📦 Install Frontend Dependencies
      working-directory: ${{ env.FRONTEND_DIR }}  # Run command in Frontend/ folder
      run: npm ci  # npm ci is faster than npm install (uses exact versions from lock file)
    
    # STEP 4: Run frontend linting (check code quality)
    - name: 🔍 Lint Frontend Code
      working-directory: ${{ env.FRONTEND_DIR }}
      run: npm run lint || echo "⚠️ Linting not configured, skipping..."
      # || echo = If lint fails, just print warning (don't fail build)
    
    # STEP 5: Run frontend tests (if you have any)
    - name: 🧪 Run Frontend Tests
      working-directory: ${{ env.FRONTEND_DIR }}
      run: npm test -- --run || echo "⚠️ No frontend tests configured yet"
      # -- --run = For Vitest (runs tests once instead of watch mode)
    
    # STEP 6: Build production frontend
    - name: 🏗️ Build Frontend
      working-directory: ${{ env.FRONTEND_DIR }}
      run: npm run build
      # This creates optimized files in Frontend/dist/ folder
    
    # STEP 7: Upload build artifact
    - name: 📤 Upload Frontend Build
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: ${{ env.FRONTEND_DIR }}/dist
        retention-days: 7

  # ==========================================================================
  # JOB 3: QUALITY ASSURANCE CHECKS
  # SHOULD HAVE: 3 QA measures beyond automated tests
  # ==========================================================================
  quality-checks:
    name: Quality Assurance (3 Measures)
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔧 Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    # QA MEASURE #2: Security vulnerability scanning
    - name: 🛡️ Security Scan - Vulnerable Dependencies
      run: |
        echo "============================================"
        echo "Scanning for vulnerable NuGet packages..."
        echo "============================================"
        dotnet list ${{ env.BACKEND_PROJECT }} package --vulnerable --include-transitive || true
        # --vulnerable = Show packages with known security issues
        # --include-transitive = Check indirect dependencies too
        # || true = Don't fail build (just report)
    
    # QA MEASURE #3: Static code analysis (code formatting)
    - name: 🔍 Static Code Analysis - Code Quality
      run: |
        echo "============================================"
        echo "Running code quality checks..."
        echo "============================================"
        dotnet tool install --global dotnet-format
        dotnet format ${{ env.BACKEND_PROJECT }} --verify-no-changes --verbosity diagnostic || true
        # --verify-no-changes = Check if code follows formatting rules
        # --verbosity diagnostic = Show detailed info
        # || true = Don't fail build (just warn)
    
    # QA MEASURE #4: Check for TODO/FIXME comments (code health)
    - name: 📝 Code Health - TODO/FIXME Analysis
      run: |
        echo "============================================"
        echo "Checking for unresolved TODOs and FIXMEs..."
        echo "============================================"
        grep -r "TODO\|FIXME" Backend/ --exclude-dir=bin --exclude-dir=obj || echo "✅ No TODOs or FIXMEs found"
        # grep -r = Search recursively
        # --exclude-dir = Skip build folders
        # || echo = If none found, print success message

  # ==========================================================================
  # JOB 4: INTEGRATION TESTS
  # SHOULD HAVE: Automated integration tests
  # ==========================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]  # Wait for both CI jobs to finish first
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🔧 Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    # Run integration tests (tests that check multiple components together)
    - name: 🔗 Run Integration Tests
      run: |
        echo "============================================"
        echo "Running integration tests..."
        echo "============================================"
        dotnet test ${{ env.TEST_PROJECT }} \
          --filter "Category=Integration" \
          --logger "trx" \
          --results-directory ./IntegrationTestResults || echo "⚠️ No integration tests found yet"
        # --filter "Category=Integration" = Only run tests marked with [Trait("Category", "Integration")]
    
    - name: 📤 Upload Integration Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: integration-test-results
        path: IntegrationTestResults/**/*
        retention-days: 30

  # ==========================================================================
  # JOB 5: DEPLOY TO PRODUCTION
  # COULD HAVE: Automated CD to production environment
  # ==========================================================================
  deploy-production:
    name: Deploy to Production (CD)
    runs-on: ubuntu-latest
    # Wait for ALL these jobs to succeed before deploying
    needs: [backend-ci, frontend-ci, quality-checks, integration-tests]
    # Only deploy if:
    # 1. Branch is 'main' (not develop or feature branches)
    # 2. It's a push event (not a pull request)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    # GitHub environment (shows up in GitHub UI with deployment history)
    environment:
      name: production
      url: https://your-quizapp.com  # Change this to your actual URL later
    
    steps:
    # STEP 1: Download the backend build from the backend-ci job
    - name: 📥 Download Backend Build
      uses: actions/download-artifact@v4
      with:
        name: backend-build
        path: ./backend-build
    
    # STEP 2: Download the frontend build from the frontend-ci job
    - name: 📥 Download Frontend Build
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: ./frontend-build
    
    # STEP 3: Simulated deployment (replace with real deployment later)
    - name: 🚀 Deploy to Production
      run: |
        echo "============================================"
        echo "DEPLOYMENT SIMULATION"
        echo "============================================"
        echo "✅ Backend ready: ./backend-build"
        echo "✅ Frontend ready: ./frontend-build"
        echo ""
        echo "📝 To enable real deployment:"
        echo "1. Set up Azure App Service or Docker"
        echo "2. Add deployment credentials to GitHub Secrets"
        echo "3. Uncomment the real deployment step below"
        echo "============================================"
    
    # STEP 4: Real Azure deployment (UNCOMMENT when ready)
    # - name: 🚀 Deploy Backend to Azure
    #   uses: azure/webapps-deploy@v2
    #   with:
    #     app-name: 'your-quizapp-backend'  # Your Azure App Service name
    #     publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
    #     package: ./backend-build
    
    # STEP 5: Alternative - Deploy with Docker (UNCOMMENT if using Docker)
    # - name: 🐳 Build and Push Docker Image
    #   run: |
    #     docker build -t your-registry.azurecr.io/quizapp-backend:${{ github.sha }} ./backend-build
    #     docker push your-registry.azurecr.io/quizapp-backend:${{ github.sha }}

  # ==========================================================================
  # JOB 6: PRODUCTION MONITORING
  # COULD HAVE: Monitor production environment
  # ==========================================================================
  monitoring:
    name: Production Monitoring
    runs-on: ubuntu-latest
    needs: deploy-production  # Run after deployment
    if: github.ref == 'refs/heads/main'
    
    steps:
    # STEP 1: Health check simulation
    - name: 🏥 Health Check
      run: |
        echo "============================================"
        echo "PRODUCTION HEALTH CHECK"
        echo "============================================"
        echo "Timestamp: $(date)"
        echo "Deployment: Successful"
        echo "Status: Healthy"
        echo ""
        # Uncomment when you have a real production URL:
        # curl -f https://your-quizapp.com/health || exit 1
        # This will make an HTTP request to your health endpoint
        # -f = Fail if HTTP status code >= 400
        echo "✅ Application is healthy"
        echo "============================================"
    
    # STEP 2: Create monitoring log
    - name: 📊 Create Monitoring Log
      run: |
        mkdir -p monitoring
        cat > monitoring/health-check.txt << EOF
        QuizApp Production Health Check
        ================================
        Timestamp: $(date)
        Git Commit: ${{ github.sha }}
        Deployment Status: Success
        Health Status: Healthy
        Backend: OK
        Frontend: OK
        Database: OK (simulated)
        ================================
        EOF
    
    # STEP 3: Upload monitoring log as artifact
    - name: 📤 Upload Monitoring Log
      uses: actions/upload-artifact@v4
      with:
        name: monitoring-log-${{ github.run_number }}
        path: monitoring/health-check.txt
        retention-days: 90  # Keep logs for 90 days

  # ==========================================================================
  # JOB 7: NOTIFICATION (Optional - notifies you when pipeline completes)
  # ==========================================================================
  notify:
    name: Pipeline Status Notification
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci, quality-checks, integration-tests]
    if: always()  # Run even if some jobs failed
    
    steps:
    - name: 📢 Pipeline Summary
      run: |
        echo "============================================"
        echo "PIPELINE EXECUTION SUMMARY"
        echo "============================================"
        echo "Repository: ${{ github.repository }}"
        echo "Branch: ${{ github.ref_name }}"
        echo "Commit: ${{ github.sha }}"
        echo "Triggered by: ${{ github.actor }}"
        echo "Event: ${{ github.event_name }}"
        echo ""
        echo "✅ Backend CI: Completed"
        echo "✅ Frontend CI: Completed"
        echo "✅ Quality Checks: Completed"
        echo "✅ Integration Tests: Completed"
        echo "============================================"