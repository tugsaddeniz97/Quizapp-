name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build, Test & Quality Checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # QA Measure 1: Dependency Security Check
      - name: Restore dependencies
        run: dotnet restore

      # QA Measure 2: Build Verification
      - name: Build
        run: dotnet build --configuration Release --no-restore

      # QA Measure 3: Unit Tests with Coverage
      - name: Run Unit Tests with Coverage
        run: dotnet test --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage"

      # QA Measure 4: Upload Coverage Report
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: "**/coverage.cobertura.xml"
          fail_ci_if_error: false

      # QA Measure 5: Code Quality Analysis (optional but good)
      - name: Install dotnet-format
        run: dotnet tool install -g dotnet-format

      - name: Check Code Formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic
        continue-on-error: true

      # Build Artifacts
      - name: Publish Application
        run: dotnet publish QuizApp/QuizApp.csproj -c Release -o ./publish

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quizapp-build
          path: ./publish

  # Optional: Deploy to Production (Could Have)
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Deploy to Production

    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: quizapp-build
          path: ./publish

      - name: Simulate Deployment
        run: |
          echo "🚀 Deploying to production environment..."
          echo "📦 Artifact size: $(du -sh ./publish | cut -f1)"
          echo "✅ Deployment successful"

  # Optional: Monitoring (Could Have - Simulated)
  monitoring:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    name: Production Monitoring

    steps:
      - name: Simulate Health Check
        run: |
          echo "🔍 Running production health checks..."
          echo "✅ API endpoint: healthy"
          echo "✅ Database connection: healthy"
          echo "✅ Response time: 120ms"
          echo "📊 Monitoring complete"
